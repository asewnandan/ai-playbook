<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="xl" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="md" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="4.5"/>
    </filter>
    <filter id="sm" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <style>
      /* outer group spins, inner group breathes independently */
      .spin {
        transform-origin: 100px 100px;
        animation: spin 11s linear infinite;
      }
      .breathe {
        transform-origin: 100px 100px;
        animation: breathe 4.5s ease-in-out infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1);    }
        50%       { transform: scale(1.04); }
      }
    </style>
  </defs>

  <g class="spin">
    <g class="breathe">

      <!-- r=75, C≈471. dashoffset positions arc start clockwise from 3-o'clock.
           Gap is at ~1–2 o'clock (offset ~360–420).
           Pink is at 7–8 o'clock (offset ~310).
           Teal at 12 o'clock (offset ~353). -->

      <!-- [1] broad pink/magenta outer halo at lower-left -->
      <circle cx="100" cy="100" r="75" fill="none"
              stroke="#FF2D7A" stroke-width="28" stroke-linecap="round"
              stroke-dasharray="140 331" stroke-dashoffset="310"
              opacity="0.80" filter="url(#xl)"/>

      <!-- [2] blue/indigo body — main arc, ~230° -->
      <circle cx="100" cy="100" r="75" fill="none"
              stroke="#3A63E8" stroke-width="15" stroke-linecap="round"
              stroke-dasharray="300 171" stroke-dashoffset="55"
              opacity="0.78" filter="url(#md)"/>

      <!-- [3] teal/cyan accent at top, ~75° -->
      <circle cx="100" cy="100" r="76" fill="none"
              stroke="#00D8F0" stroke-width="9" stroke-linecap="round"
              stroke-dasharray="98 373" stroke-dashoffset="328"
              opacity="0.85" filter="url(#md)"/>

      <!-- [4] thin bright pink edge — gives the sharp inner rim -->
      <circle cx="100" cy="100" r="74" fill="none"
              stroke="#FF6A9A" stroke-width="2.5" stroke-linecap="round"
              stroke-dasharray="120 351" stroke-dashoffset="300"
              opacity="0.90" filter="url(#sm)"/>

      <!-- [5] lavender/white hairline highlight near top -->
      <circle cx="100" cy="100" r="75" fill="none"
              stroke="#C8B0FF" stroke-width="2" stroke-linecap="round"
              stroke-dasharray="65 406" stroke-dashoffset="340"
              opacity="0.85" filter="url(#sm)"/>

    </g>
  </g>
</svg>
